spring.application.name=backend
server.port=8080

# ===============================
# DATABASE CONFIGURATION (MySQL)
# ===============================
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/tems_db}
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:PARK@sik2023}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
# Allows Hibernate to automatically create/update tables defined by our Entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Debug Logging
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.transaction=DEBUG

# ===============================
# SECURITY / CORS CONFIGURATION
# ===============================
# Allowing frontend connections from Vite
frontend.url=${FRONTEND_URL:http://localhost:3000}
